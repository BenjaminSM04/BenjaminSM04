# GitHub Action for generating a contribution graph with a snake eating your contributions.
name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Generate the snake files in './dist/'
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # 🎨 Glimmer light
            dist/github-contribution-grid-snake.svg?color_snake=#A6586D&color_dots=#BDF2D4,#F2CEDB,#BF658F,#D9C8A9
            # 🎨 Glimmer dark
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#BF658F&color_dots=#F2CEDB,#BDF2D4,#D9C8A9,#6F4D58
            # 🎨 Glimmer GIF (opcional)
            dist/github-contribution-grid-snake.gif?color_snake=#A6586D&color_dots=#BDF2D4,#F2CEDB,#BF658F,#D9C8A9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show build status
        run: git status

      - name: Push new files to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          commit_message: Update snake animations (Glimmer palette)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
